<!DOCTYPE html>
<html>
<head><title>Test</title></head>
<body style="background:#111;color:white;font-family:sans-serif;padding:40px;">
<h1 style="color:#f5a623">Dashboard Test</h1>
<p id="msg">Loading...</p>
<div id="data" style="margin-top:20px;"></div>
<script>
document.getElementById('msg').textContent = 'JavaScript is working!';

// Show hardcoded data
const data = [
  {date:'01 Apr',zepto:210535,blinkit:484025,instamart:260140},
  {date:'02 Apr',zepto:214808,blinkit:489034,instamart:276850},
  {date:'03 Apr',zepto:233064,blinkit:493325,instamart:286205},
];

let html = '<table style="border-collapse:collapse;width:100%">';
html += '<tr><th style="padding:8px;border:1px solid #333;color:#f5a623">Date</th><th style="padding:8px;border:1px solid #333;color:#4f9cf9">Zepto</th><th style="padding:8px;border:1px solid #333;color:#f5a623">Blinkit</th><th style="padding:8px;border:1px solid #333;color:#2ecc71">Instamart</th></tr>';
data.forEach(r => {
  html += `<tr>
    <td style="padding:8px;border:1px solid #333">${r.date}</td>
    <td style="padding:8px;border:1px solid #333">₹${r.zepto.toLocaleString()}</td>
    <td style="padding:8px;border:1px solid #333">₹${r.blinkit.toLocaleString()}</td>
    <td style="padding:8px;border:1px solid #333">₹${r.instamart.toLocaleString()}</td>
  </tr>`;
});
html += '</table>';
document.getElementById('data').innerHTML = html;
</script>
</body>
</html>
